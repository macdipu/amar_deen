          want to review. New route + home-screen entry point added. Not verified by
          flutter tooling (unavailable this session).
      - id: TASK-013
        status: done
        summary: >
          Azan alarm system. Done 2026-07-19. Found the pre-existing scheduling code was
          dead (RequestTimingForTomorrow never dispatched) - rebuilt via new
          AzanSchedulerService (lib/core/notifications/, one-shot exact alarms, not
          daily-repeat) + AzanSettingsBloc (per-prayer toggle) + BlocConsumer wiring in
