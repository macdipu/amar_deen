    name: Stabilize
    tasks:
      - id: TASK-001
        status: done
        summary: Audit pubspec.yaml, fix SDK constraint, upgrade dependencies.
      - id: TASK-002
        status: done
        summary: Resolve remaining build-breaking issues (keys.dart via String.fromEnvironment).
      - id: TASK-003
        status: done
        summary: Confirm green build on a real/emulated device. Required a full Android Gradle toolchain migration (Gradle 7.4->8.14.2, AGP 7.1.2->8.11.1, Kotlin 1.6.10->2.2.20) and replacing 2 dead plugins (flutter_native_timezone, motion_sensors) whose native code used removed Flutter v1-embedding APIs. See PROGRESS.md for full detail.

