          (POST_NOTIFICATIONS/SCHEDULE_EXACT_ALARM/RECEIVE_BOOT_COMPLETED/VIBRATE) and an
          exact-alarm permission request during onboarding. KNOWN GAP: no real Azan audio
          file exists in the repo - still uses the flutter_local_notifications example
