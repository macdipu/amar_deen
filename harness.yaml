          reboot survival can't be confirmed by reading code).
      - id: TASK-014
        status: todo
        summary: Airplane-mode manual verification, logged in PROGRESS.md.

  - id: EPIC-3
    name: Worship Essentials
    tasks:
      - id: TASK-015
        status: done
        summary: >
          Done 2026-07-20 as verify-only, not build-from-scratch. Investigation found
