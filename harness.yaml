        status: done
        summary: Create core/ + features/ folder skeleton, placeholder files only.
      - id: TASK-005
        status: done
        summary: >
          get_it + injectable DI container in core/di/. Dependencies added and versions
          verified against pub.dev; Qibla feature classes annotated (@LazySingleton,
          @injectable); QiblaBloc now resolves its use case via getIt. configureDependencies()
          was hand-written manual registration until 2026-07-19, when Flutter tooling became
          available for the first time and build_runner generated the real injection.config.dart
          (matched the hand-written version exactly) - see PROGRESS.md.
      - id: TASK-006
        status: done
        summary: >
          go_router setup in core/routing/. Old lib/routes/routes.dart deleted outright
          (atomic cutover, not parallel-track like TASK-004/007 - a MaterialApp can't run
          both onGenerateRoute and MaterialApp.router at once). 7 files with real named-route
          navigation updated to go_router's context.push/pushReplacement; anonymous
          MaterialPageRoute pushes and Navigator.pop left untouched. Unverified: no flutter
          tooling in this session to run pub get/analyze/an actual app launch - see PROGRESS.md.
      - id: TASK-007
        status: done
        summary: >
          Migrate Qibla feature end-to-end - proof of pattern, smallest feature first.
          Sensor/bearing engine already replaced (motion_sensors -> flutter_qiblah) as part of
          TASK-003's build fix, collapsing QiblaBloc+AngleBloc into one bloc. Folder move into
          data/domain/presentation done 2026-07-19 with full Repository Pattern (entity, repo
          interface + impl, use case) - see PROGRESS.md. Old lib/src/features/qibla/ deleted
          2026-07-19 once flutter analyze confirmed it was unreferenced (see "fix all bugs"
          verification pass entry in PROGRESS.md).
      - id: TASK-008
        status: done
        summary: >
          Migrate Theme (light/dark) into core/theme/, verify toggle still works. Done
          2026-07-19 - closes Epic 1. app_theme.dart + theme_bloc/ moved verbatim, logic
          unchanged. Deliberately did not move the raw color constants (kDarkPrimary etc.)
          out of constants.dart - out of this task's scope, used directly in 9 unrelated
          files. Not verified by an actual running toggle (no flutter tooling this session).

  - id: EPIC-2
    name: Offline Prayer Core
    tasks:
      - id: TASK-009
        status: done
        summary: >
          PrayerRepository interface + adhan_dart-backed impl in features/prayer_times/. Done
