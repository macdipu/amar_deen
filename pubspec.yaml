name: amar_deen
description: Amar Deen — offline-first Islamic companion app for Muslim brothers
publish_to: "none"
version: 1.0.1+2

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.9
  dartz: ^0.10.1
  dio: ^5.10.0
  equatable: ^2.1.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_local_notifications: ^22.1.0
  flutter_screenutil: ^5.9.3
  flutter_staggered_grid_view: ^0.7.0
  flutter_svg: ^2.3.0
  geocoding: ^5.0.0
  geolocator: ^14.0.3
  google_fonts: ^8.2.0
  hijri_calendar: ^1.0.7+7
  hydrated_bloc: ^11.0.0
  intl: ^0.20.2
  lottie: ^3.5.1
  muslim_data_flutter: ^1.5.0
  path_provider: ^2.1.6
  permission_handler: ^12.0.3
  qcf_quran: 0.0.5
  quran: ^1.4.1
  rxdart: ^0.28.0
  share_plus: ^13.2.1
  shared_preferences: ^2.5.5
  sqflite: ^2.4.3
  url_launcher: ^6.3.2
  just_audio: ^0.10.6
  connectivity_plus: ^7.3.0
  audio_session: ^0.2.4
  video_player: ^2.13.0
  flutter_timezone: ^5.1.0
  flutter_qiblah: ^3.2.0
  get_it: ^9.2.1
  injectable: ^3.0.0
  go_router: ^17.3.0
  adhan_dart: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.15.1
  injectable_generator: ^3.0.2

dependency_overrides:
  path_provider_foundation: ^2.6.0

flutter:
  uses-material-design: true
  generate: true
  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/latest.db
    - assets/images/core/json/
    - assets/images/core/svg/
    - assets/images/error/lottie_json/
    - assets/images/navigation_icon/svg/
    - assets/images/home_icon/svg/
    - assets/images/home_icon/lottie_json/
    - assets/images/collection_icon/svg/
    - assets/images/qiblat_icon/svg/
    - assets/images/praying_time/svg/
    - assets/images/setting_icon/svg/
    - assets/images/error/lottie_json/
    - assets/images/permission/lottie_json/
    - assets/images/tasbih_icon/svg/
    - assets/images/dua_icon/svg/
    - assets/images/quran_icon/svg/
    - assets/images/image_of_the_day/
    - assets/sound/

  fonts:
    - family: Uthman
      fonts:
        - asset: assets/fonts/Uthman-Taha-Naskh-Regular.otf
        - asset: assets/fonts/Uthman-Taha-Naskh-Bold.otf
          weight: 700
    - family: Jameel
      fonts:
        - asset: assets/fonts/jameel.ttf

    - family: "arsura"
      fonts:
        - asset: assets/fonts/arsura.ttf
